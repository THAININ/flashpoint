<header>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="{% url 'store:home' %}">Flashpoint Games</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="{% url 'store:home' %}">Página Inicial</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Jogos</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Consoles</a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Playstation</a></li>
                            <li><a class="dropdown-item" href="#">Xbox</a></li>
                            <li><a class="dropdown-item" href="#">Nintendo</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#">Consoles Retros</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Busque na Flashpoint">
                    <button class="btn btn-outline-success" type="submit">Pesquisar</button>
                </form>
                <div class="ms-auto">
                    {% if user.is_authenticated %}
                        <div class="dropdown">
                            <button class="btn bg-body-tertiary dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-2" style="font-size: 1.2rem;"></i>
                                <span>Ola, {{ user.username }}!</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="{% url 'users:profile' %}">Perfil</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li>
                                    <form action="{% url 'users:logout' %}" method="post">
                                        {% csrf_token %}
                                        <button class="dropdown-item text-danger" type="submit">Sair</button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    {% else %}
                        <a class="btn btn-outline-primary d-flex align-items-center" href="{% url 'users:login' %}">
                            <i class="bi bi-person-circle me-2"></i>
                            <span>Entrar</span>
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
</header>
