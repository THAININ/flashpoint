{% block content %}
    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p style="color: red; font-weight: bold;">
                    {{ message }}
                </p>
            {% endfor %}
        </div>
    {% endif %}

    <form action="" method="post">
        {% csrf_token %}
        {{ form.as_p }}  <input type="submit" value="Login">
    </form>
    <a href="{% url 'users:password_reset' %}">Esqueci minha senha</a>
{% endblock %}
